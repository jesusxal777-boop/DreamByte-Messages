<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> 
    <link rel="stylesheet" href="style.css">
    <title>DreamByte Network - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="box">
        <h1>Login</h1>
        <input type="email" id="inEmail" placeholder="Email">
        <input type="password" id="inPassword" placeholder="Contraseña">
        <button id="btnLogin">Conectarse</button>
        <p onclick="location.href='register.html'" style="cursor:pointer; margin-top:10px;">¿Nuevo? Regístrate</p>
    </div>

    <script src="auth.js"></script>
    
    <script>
        document.getElementById('btnLogin').onclick = async () => {
            const email = document.getElementById('inEmail').value.trim();
            const password = document.getElementById('inPassword').value.trim();

            if (!email || !password) return alert("Rellena todo.");

            try {
                // Usamos la variable 'db' que viene de auth.js
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                
                if (error) {
                    console.error("Error detallado:", error);
                    alert("Error: " + error.message);
                } else {
                    window.location.href = 'chat.html';
                }
            } catch (err) {
                alert("Error de conexión: " + err.message);
            }
        };
    </script>
</body>
</html>
