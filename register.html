<!DOCTYPE html>
<html lang="es">
    <style>:root {
    --bg-gradient: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%);
    --glass-bg: rgba(255, 255, 255, 0.22);
    --glass-blur: blur(20px);
    --glass-border: 1px solid rgba(255, 255, 255, 0.4);
    --text-light: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
body { background: var(--bg-gradient); height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-box {
    width: 100%; max-width: 380px; padding: 35px; background: var(--glass-bg); 
    backdrop-filter: var(--glass-blur); border: var(--glass-border); 
    border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); color: white;
}
input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #0084ff; color: white; cursor: pointer; font-weight: bold; }
</style>
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
<body>
    <div class="box">
        <h1>Registro</h1>
        <input type="text" id="inUsername" placeholder="Usuario">
        <input type="email" id="inEmail" placeholder="Email">
        <input type="password" id="inPassword" placeholder="Contraseña">
        <button id="btnReg">Registrarse</button>
    </div>
    <script>
        const db = supabase.createClient('https://qynkgbgxavjgmvnskbsd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5bmtnYmd4YXZqZ212bnNrYnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NDQ5NzMsImV4cCI6MjA5NTQyMDk3M30.2lbtOLD-pgKYYrJiNsaOIsw3oM3jaZUgccDA-68Y6JI');
        
        document.getElementById('btnReg').onclick = async () => {
            const { error } = await db.auth.signUp({
                email: document.getElementById('inEmail').value,
                password: document.getElementById('inPassword').value,
                options: { data: { username: document.getElementById('inUsername').value } }
            });
            if (error) alert(error.message);
            else alert('Revisa tu correo o vuelve al Login'), location.href='index.html';
        };
    </script>
</body>
</html>
