<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DreamByte OS - Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (Usa el CSS de antes) */
    </style>
</head>
<body>
    <script>
        const db = supabase.createClient('URL', 'KEY');
        let user = null;
        let activeRoomId = null;

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) return location.href = 'index.html';
            user = session.user;

            // 1. Conectar botones manualmente
            document.getElementById('btnSendMessage').onclick = sendMessage;
            document.getElementById('btnNewRoom').onclick = createRoom;

            // 2. Cargar datos
            await refreshRooms();
        }

        async function sendMessage() {
            const input = document.getElementById('inMessage');
            const content = input.value.trim();
            if (!content || !activeRoomId) return alert("Selecciona una sala");

            try {
                const { error } = await db.from('messages').insert([
                    { room_id: activeRoomId, user_id: user.id, content: content }
                ]);
                if (error) throw error;
                input.value = '';
            } catch (err) {
                console.error("Error al enviar mensaje:", err);
                alert("Error: " + err.message);
            }
        }

        async function createRoom() {
            const name = prompt("Nombre de la sala:");
            if (!name) return;
            try {
                const { error } = await db.from('rooms').insert([{ name: name }]);
                if (error) throw error;
                refreshRooms();
            } catch (err) {
                console.error("Error al crear sala:", err);
                alert("No se pudo crear la sala.");
            }
        }

        init();
    </script>
</body>
</html>
