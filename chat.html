<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamByte OS - Chat Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%);
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-blur: blur(20px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.4);
            --text-main: #0f2a4a;
            --text-light: #ffffff;
            --accent-blue: #0084ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-gradient); height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: var(--text-main); }

        .app-window { width: 100%; max-width: 1100px; height: 85vh; display: flex; overflow: hidden; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
        
        .sidebar { width: 280px; border-right: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.05); }
        .sidebar-nav { padding: 18px; display: flex; justify-content: space-between; align-items: center; color: var(--text-light); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .scroller { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .item-room { padding: 12px 15px; border-radius: 10px; background: rgba(255, 255, 255, 0.15); cursor: pointer; color: var(--text-light); font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .item-room:hover { background: rgba(255, 255, 255, 0.3); }
        .item-room.active { background: #ffffff; color: var(--text-main); font-weight: 700; }

        .sidebar-user { padding: 15px; border-top: 1px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: space-between; color: var(--text-light); font-size: 0.85rem; font-weight: bold; }

        .chat-space { flex: 1; display: flex; flex-direction: column; }
        .chat-space-header { padding: 18px 25px; color: var(--text-light); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .msg-feed { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        
        .bubble { background: rgba(255, 255, 255, 0.85); padding: 12px 16px; border-radius: 14px; max-width: 65%; align-self: flex-start; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .bubble.own { background: linear-gradient(to bottom, #54a0ff, #0084ff); color: white; align-self: flex-end; box-shadow: 0 4px 12px rgba(0, 132, 255, 0.3); }
        .meta-user { font-size: 0.72rem; font-weight: 700; color: #2e669a; margin-bottom: 4px; }
        .bubble.own .meta-user { color: #d0e8ff; }
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 6px; display: block; }

        .input-deck { padding: 18px; display: flex; gap: 12px; align-items: center; background: rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255,255,255,0.1); }
        .input-deck input[type="text"] { flex: 1; border-radius: 24px; padding: 12px 20px; border: none; outline: none; }
        .media-label { cursor: pointer; font-size: 1.4rem; }
        .media-label input { display: none; }
        
        .btn-green { padding: 6px 12px; font-size: 0.75rem; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { border-radius: 24px; padding: 10px 22px; background: #0084ff; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-window">
        <aside class="sidebar">
            <div class="sidebar-nav">
                <h3>Canales Core</h3>
                <button class="btn-green" id="btnNewRoom">+ Crear</button>
            </div>
            <div class="scroller" id="containerRooms"></div>
            <div class="sidebar-user">
                <span id="txtUserTag">@...</span>
                <span id="btnLogout" style="cursor:pointer; text-decoration:underline;">Salir</span>
            </div>
        </aside>

        <main class="chat-space">
            <div class="chat-space-header" id="containerRoomHeader">
                <h2>Consola de Comunicación</h2>
                <p>Cargando canales del servidor corporativo...</p>
            </div>
            <div class="msg-feed" id="containerMessages"></div>
            <div class="input-deck" id="deckControls" style="visibility: hidden;">
                <label class="media-label">
                    🖼️ <input type="file" id="inFile" accept="image/*">
                </label>
                <input type="text" id="inMessage" placeholder="Escribe un mensaje en el canal...">
                <button class="btn-blue" id="btnSendMessage">Enviar</button>
            </div>
        </main>
    </div>

<script>
    const db = supabase.createClient('https://qynkgbgxavjgmvnskbsd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5bmtnYmd4YXZqZ212bnNrYnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NDQ5NzMsImV4cCI6MjA5NTQyMDk3M30.2lbtOLD-pgKYYrJiNsaOIsw3oM3jaZUgccDA-68Y6JI');

    let user = null;
    let activeRoomId = null;
    let subMessages = null;

    async function checkAuth() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) {
            location.href = 'index.html'; // Expulsar si no está autenticado
        } else {
            user = session.user;
            const { data: prof } = await db.from('profiles').select('username').eq('id', user.id).maybeSingle();
            document.getElementById('txtUserTag').innerText = `@${prof?.username || 'User'}`;
            
            await refreshRooms();
            listenRoomsRealtime();
            
            // Forzar entrada al Chat Global automático
            selectRoom({ id: '00000000-0000-0000-0000-000000000000', name: 'Chat Global 🌐' });
        }
    }

    async function refreshRooms() {
        const { data: rooms } = await db.from('rooms').select('*').order('created_at', { ascending: true });
        const container = document.getElementById('containerRooms');
        container.innerHTML = '';
        
        rooms?.forEach(room => {
            const el = document.createElement('div');
            el.classList.add('item-room');
            if (room.id === activeRoomId) el.classList.add('active');
            const icon = room.id === '00000000-0000-0000-0000-000000000000' ? '🌐' : '📁';
            el.innerHTML = `<span>${icon}</span> <span>${escape(room.name)}</span>`;
            el.addEventListener('click', () => selectRoom(room));
            container.appendChild(el);
        });
    }

    function listenRoomsRealtime() {
        db.channel('realtime-rooms').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rooms' }, () => refreshRooms()).subscribe();
    }

    async function selectRoom(room) {
        activeRoomId = room.id;
        await refreshRooms();

        document.getElementById('containerRoomHeader').innerHTML = `<h2># ${escape(room.name)}</h2><p>Canal activo ID: ${room.id}</p>`;
        document.getElementById('deckControls').style.visibility = "visible";

        if (subMessages) db.removeChannel(subMessages);

        const { data: messages } = await db.from('messages').select(`id, content, user_id, profiles(username)`).eq('room_id', room.id).order('created_at', { ascending: true });
        const feed = document.getElementById('containerMessages');
        feed.innerHTML = '';
        messages?.forEach(msg => appendMessage(msg, msg.profiles?.username || 'Anon'));
        feed.scrollTop = feed.scrollHeight;

        subMessages = db.channel(`room:${room.id}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${room.id}` }, async (payload) => {
                const { data: p } = await db.from('profiles').select('username').eq('id', payload.new.user_id).maybeSingle();
                appendMessage(payload.new, p?.username || 'Anon');
                feed.scrollTop = feed.scrollHeight;
            }).subscribe();
    }

    function appendMessage(msg, name) {
        const isOwn = msg.user_id === user.id;
        const div = document.createElement('div');
        div.classList.add('bubble');
        if (isOwn) div.classList.add('own');

        let body = `<div>${escape(msg.content)}</div>`;
        if (msg.content.startsWith('http') && msg.content.includes('/storage/v1/object/public/')) {
            body = `<img src="${msg.content}" alt="Image" style="max-width:220px;" onload="document.getElementById('containerMessages').scrollTop = document.getElementById('containerMessages').scrollHeight">`;
        }

        div.innerHTML = `<div class="meta-user">${escape(name)}</div>${body}`;
        document.getElementById('containerMessages').appendChild(div);
    }

    document.getElementById('btnSendMessage').addEventListener('click', sendMessage);
    document.getElementById('inMessage').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    async function sendMessage() {
        const input = document.getElementById('inMessage');
        const txt = input.value.trim();
        if (!txt || !activeRoomId) return;
        input.value = '';
        await db.from('messages').insert([{ room_id: activeRoomId, user_id: user.id, content: txt }]);
    }

    document.getElementById('btnNewRoom').addEventListener('click', async () => {
        const name = prompt('Nombre de la nueva sala:');
        if (!name || !name.trim()) return;
        const { data } = await db.from('rooms').insert([{ name: name.trim(), created_by: user.id }]).select();
        if (data && data[0]) selectRoom(data[0]);
    });

    document.getElementById('inFile').addEventListener('change', async () => {
        const file = document.getElementById('inFile').files[0];
        if (!file || !activeRoomId) return;
        const path = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
        await db.storage.from('chat-attachments').upload(path, file);
        const url = db.storage.from('chat-attachments').getPublicUrl(path).data.publicUrl;
        await db.from('messages').insert([{ room_id: activeRoomId, user_id: user.id, content: url }]);
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
        await db.auth.signOut();
        location.href = 'index.html';
    });

    function escape(str) { return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }
    
    checkAuth();
</script>
</body>
</html>
