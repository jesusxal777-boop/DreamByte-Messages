<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .chat-layout { display: flex; height: 100vh; width: 100%; color: white; }
        .sidebar { width: 250px; background: rgba(0,0,0,0.2); padding: 20px; display: flex; flex-direction: column; }
        .main-chat { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        .room-item { cursor: pointer; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="chat-layout">
        <div class="sidebar">
            <h3>Canales</h3>
            <div id="roomList"></div>
            <button id="btnNewRoom" style="margin-top:auto;">+ Nuevo Canal</button>
        </div>

        <div class="main-chat">
            <div id="containerMessages" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
            <div style="display:flex;">
                <input type="text" id="inMessage" style="flex:1;" placeholder="Escribe un mensaje...">
                <button id="btnSendMessage">Enviar</button>
                <div class="controls">
    <input type="file" id="fileInput" style="display:none">
    <button onclick="document.getElementById('fileInput').click()">📎</button>
    <button id="btnRecord">🎤</button>
</div>

            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>
