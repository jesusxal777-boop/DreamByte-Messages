<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DreamByte OS - Chat Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (Mantén aquí el CSS que ya tenías, está perfecto) */
    </style>
</head>
<body>
    <script>
    const db = supabase.createClient('https://qynkgbgxavjgmvnskbsd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5bmtnYmd4YXZqZ212bnNrYnNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NDQ5NzMsImV4cCI6MjA5NTQyMDk3M30.2lbtOLD-pgKYYrJiNsaOIsw3oM3jaZUgccDA-68Y6JI');

    let user = null;
    let activeRoomId = null;
    let subMessages = null;

    async function init() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) return location.href = 'index.html';
        user = session.user;
        
        // Cargar usuario
        const { data: prof } = await db.from('profiles').select('username').eq('id', user.id).maybeSingle();
        document.getElementById('txtUserTag').innerText = `@${prof?.username || 'User'}`;
        
        await refreshRooms();
        listenRoomsRealtime();
        
        // Entrar al Chat Global al iniciar
        selectRoom({ id: '00000000-0000-0000-0000-000000000000', name: 'Chat Global 🌐' });
    }

    // LISTENER REALTIME: Este es el motor que estabas buscando
    function listenRoomsRealtime() {
        db.channel('public:rooms')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'rooms' }, () => refreshRooms())
          .subscribe();
    }

    async function selectRoom(room) {
        activeRoomId = room.id;
        document.getElementById('containerRoomHeader').innerHTML = `<h2># ${escape(room.name)}</h2>`;
        document.getElementById('deckControls').style.visibility = "visible";

        // Cargar historial
        const { data: msgs } = await db.from('messages').select('*, profiles(username)').eq('room_id', room.id).order('created_at', { ascending: true });
        const feed = document.getElementById('containerMessages');
        feed.innerHTML = '';
        msgs?.forEach(m => appendMessage(m, m.profiles?.username));

        // Suscripción Realtime específica para esta sala
        if (subMessages) db.removeChannel(subMessages);
        subMessages = db.channel(`room:${room.id}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${room.id}` }, async (payload) => {
                // Obtener nombre del remitente
                const { data: p } = await db.from('profiles').select('username').eq('id', payload.new.user_id).single();
                appendMessage(payload.new, p.username);
            })
            .subscribe();
    }

    function appendMessage(msg, name) {
        const feed = document.getElementById('containerMessages');
        const isOwn = msg.user_id === user.id;
        const div = document.createElement('div');
        div.className = `bubble ${isOwn ? 'own' : ''}`;
        div.innerHTML = `<div class="meta-user">${name || 'Anon'}</div><div>${escape(msg.content)}</div>`;
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
    }

    // Funciones de apoyo (sendMessage, refreshRooms, etc.) van aquí abajo...
    // ... (El resto de tu lógica que ya tenías)
    init();
</script>
</body>
</html>
